<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | Proje Portalı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { margin-top: 100px; max-width: 400px; }
    </style>
</head>
<body>

    <div class="container login-container">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Giriş Yap</h3>

                <form>
                    <div class="mb-3">
                        <label class="form-label">E-posta Adresi</label>
                        <input type="email" class="form-control" placeholder="isim@ornek.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Şifre</label>
                        <input type="password" class="form-control" placeholder="******">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
                    <div class="text-center mt-3">
    <p class="small">Hesabın yok mu? <a href="register.html" class="text-decoration-none fw-bold">Kayıt Ol</a></p>
</div>
                </form>
                <div class="text-center mt-3">
                    <a href="index.html" class="text-decoration-none small">← Ana Sayfaya Dön</a>
                </div>
            </div>
        </div>
    </div>
    <script>
    const loginForm = document.querySelector('form');

    loginForm.addEventListener('submit', function(e) {
        e.preventDefault(); // Sayfanın yenilenmesini engeller

        // Burada normalde kullanıcı adı/şifre kontrolü olur
        // Şimdilik direkt yönlendirme yapıyoruz:

        window.location.href = "normalkullanıcı.html";
    });
</script>

</body>
</html>
