<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; overflow-x: hidden; }
        
        /* SIDEBAR TASARIMI */
        #sidebar {
            min-width: 250px;
            max-width: 250px;
            min-height: 100vh;
            background: #212529;
            color: white;
            transition: all 0.3s ease;
            position: fixed;
            z-index: 1000;
        }

        #sidebar.collapsed {
            min-width: 80px;
            max-width: 80px;
        }

        #sidebar.collapsed span, #sidebar.collapsed h4 {
            display: none;
        }

        #sidebar .nav-link {
            color: #adb5bd;
            padding: 15px 20px;
            display: flex;
            align-items: center;
        }

        #sidebar.collapsed .nav-link {
            justify-content: center;
        }

        #sidebar .nav-link:hover, #sidebar .nav-link.active {
            background: #343a40;
            color: white;
        }

        /* ANA İÇERİK TASARIMI */
        .main-content {
            width: 100%;
            margin-left: 250px; /* Sidebar genişliği kadar boşluk */
            transition: all 0.3s ease;
            padding: 30px;
        }

        .main-content.expanded {
            margin-left: 80px; /* Sidebar daralınca azalan boşluk */
        }

        .admin-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="d-flex">
    <nav id="sidebar">
        <div class="d-flex justify-content-between align-items-center p-3 mb-2 border-bottom border-secondary">
            <h4 class="mb-0">Admin</h4>
            <button class="btn btn-sm btn-outline-light" id="sidebarCollapse">
                <i class="bi bi-list"></i>
            </button>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link active" href="#"><i class="bi bi-megaphone me-2"></i> <span>Duyuru Paylaş</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#"><i class="bi bi-people me-2"></i> <span>Kullanıcı İşlemleri</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#"><i class="bi bi-palette me-2"></i> <span>Tema Değiş</span></a>
            </li>
            <li class="nav-item mt-4">
                <a class="nav-link text-danger" href="index.html"><i class="bi bi-box-arrow-right me-2"></i> <span>Çıkış Yap</span></a>
            </li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2">Yönetim Ekranı</h1>
        </div>

        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="card bg-primary text-white border-0 shadow-sm p-3">
                    <h6>Toplam Kullanıcı</h6>
                    <h2 class="mb-0">154</h2>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card bg-warning text-dark border-0 shadow-sm p-3">
                    <h6>Bekleyen Uzmanlar</h6>
                    <h2 class="mb-0">12</h2>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card bg-success text-white border-0 shadow-sm p-3">
                    <h6>Aktif Duyurular</h6>
                    <h2 class="mb-0">8</h2>
                </div>
            </div>
        </div>

        <div class="admin-card">
            <h5 class="text-primary mb-3"><i class="bi bi-pencil-square me-2"></i>Yeni Duyuru Paylaş</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" placeholder="Başlık">
                </div>
                <div class="col-md-6 mb-3">
                    <select class="form-select">
                        <option>Kategori Seçin</option>
                        <option>Yazılım</option>
                        <option>Yapay Zeka</option>
                    </select>
                </div>
                <div class="col-12 mb-3">
                    <textarea class="form-control" rows="2" placeholder="Duyuru içeriği..."></textarea>
                </div>
                <div class="col-12 text-end">
                    <button class="btn btn-primary px-4">Yayınla</button>
                </div>
            </div>
        </div>

        <div class="accordion mb-4" id="expertAccordion">
            <div class="accordion-item border-0 admin-card p-0 overflow-hidden">
                <h2 class="accordion-header">
                    <button class="accordion-button bg-white text-dark fw-bold shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne">
                        <i class="bi bi-person-badge me-2 text-warning"></i> Bekleyen Uzman Onayları (12)
                    </button>
                </h2>
                <div id="collapseOne" class="accordion-collapse collapse show">
                    <div class="accordion-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Ad Soyad</th>
                                    <th>Alan</th>
                                    <th>CV</th>
                                    <th>İşlem</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Ahmet Yılmaz</td>
                                    <td>Yapay Zeka</td>
                                    <td><button class="btn btn-sm btn-outline-danger">PDF</button></td>
                                    <td>
                                        <button class="btn btn-sm btn-success">Onayla</button>
                                        <button class="btn btn-sm btn-outline-secondary">X</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.querySelector('.main-content');
    const collapseBtn = document.getElementById('sidebarCollapse');

    collapseBtn.addEventListener('click', function () {
        sidebar.classList.toggle('collapsed');
        mainContent.classList.toggle('expanded');
    });
</script>
</body>
</html>
