<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | Proje Portalı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .register-container { margin-top: 80px; max-width: 450px; }
    </style>
</head>
<body>

    <div class="container register-container">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Yeni Hesap Oluştur</h3>
                <form id="registerForm" enctype="multipart/form-data">
    <div class="mb-3">
        <label class="form-label">Ad Soyad</label>
        <input type="text" class="form-control" required>
    </div>
    
    <div class="mb-3">
        <label class="form-label">E-posta</label>
        <input type="email" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Üyelik Tipi</label>
        <select class="form-select" id="roleSelect" required onchange="toggleCVUpload()">
            <option value="user">Normal Kullanıcı</option>
            <option value="expert">Uzman (CV Gereklidir)</option>
            <option value="admin">Admin</option>
        </select>
    </div>

    <div class="mb-3 d-none" id="cvUploadSection">
        <label class="form-label text-danger fw-bold">CV Yükle (PDF formatında)</label>
        <input type="file" class="form-control border-danger" accept=".pdf">
        <small class="text-muted">Uzman başvuruları admin onayından geçmektedir.</small>
    </div>

    <div class="mb-3">
        <label class="form-label">Şifre</label>
        <input type="password" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">Kayıt Başvurusunu Tamamla</button>
</form>
                <div class="text-center mt-3">
                    <p class="small">Zaten hesabın var mı? <a href="login.html" class="text-decoration-none">Giriş Yap</a></p>
                    <a href="index.html" class="text-decoration-none small">← Ana Sayfaya Dön</a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    function toggleCVUpload() {
        const roleSelect = document.getElementById('roleSelect');
        const cvSection = document.getElementById('cvUploadSection');
        
        if (roleSelect.value === 'expert') {
            cvSection.classList.remove('d-none'); // "Uzman" seçilirse alanı göster
        } else {
            cvSection.classList.add('d-none');    // Diğer durumlarda gizle
        }
    }
    </script>

</body>
</html>

</body>
</html>
