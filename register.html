<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | Proje Portalı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .register-container { margin-top: 80px; max-width: 450px; }
    </style>
</head>
<body>

    <div class="container register-container">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Yeni Hesap Oluştur</h3>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Ad Soyad</label>
                        <input type="text" class="form-control" placeholder="Osman Kolcu">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">E-posta Adresi</label>
                        <input type="email" class="form-control" placeholder="isim@ornek.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Şifre</label>
                        <input type="password" class="form-control" placeholder="******">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Şifre Tekrar</label>
                        <input type="password" class="form-control" placeholder="******">
                    </div>
                    <button type="submit" class="btn btn-success w-100">Kayıt Ol</button>
                </form>
                <div class="text-center mt-3">
                    <p class="small">Zaten hesabın var mı? <a href="login.html" class="text-decoration-none">Giriş Yap</a></p>
                    <a href="index.html" class="text-decoration-none small">← Ana Sayfaya Dön</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
