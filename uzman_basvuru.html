<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTS - Uzmanlık Başvurusu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="d-flex align-items-center vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card p-4 p-md-5">
                <h3 class="fw-bold text-center mb-4 text-primary">Uzmanlık Başvurusu</h3>
                <p class="text-muted small text-center mb-4">Projelerinizi paylaşmak ve topluluğa liderlik etmek için uzmanlık kriterlerini sağlamanız gerekmektedir.</p>
                <hr>
                
                <form id="expertForm">
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted">Özgeçmiş (PDF Formatında)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-file-earmark-pdf text-danger"></i></span>
                            <input type="file" class="form-control border-start-0" id="expertCV" accept=".pdf" required>
                        </div>
                        <div class="form-text mt-2 text-danger" style="font-size: 0.75rem;">
                            * Uzmanlık onayı için akademik veya profesyonel CV yüklemek zorunludur.
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted">Uzmanlık Alanınız</label>
                        <select class="form-select border-0 bg-light" required>
                            <option value="">Seçiniz...</option>
                            <option>Yapay Zeka & Veri Bilimi</option>
                            <option>Backend Geliştirme</option>
                            <option>Siber Güvenlik</option>
                            <option>Robotik & Havacılık</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Başvuruyu Gönder</button>
                    <a href="normalkullanıcı.html" class="btn btn-link w-100 mt-2 text-decoration-none text-muted small">Vazgeç ve Geri Dön</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('expertForm').addEventListener('submit', function(e) {
        e.preventDefault();
        alert("Başvurunuz başarıyla alındı! İnceleme sonrasında uzman paneliniz aktif edilecektir.");
        window.location.href = "normalkullanıcı.html";
    });
</script>

</body>
</html>
